<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello Bertoli Family</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-from: #ffffff;
      --bg-to: #e8e8ed;
      --card-bg: #ffffff;
      --card-shadow: 0 8px 32px rgba(0,0,0,0.10);
      --text-primary: #1a1a2e;
      --text-secondary: #555577;
      --text-footer: #aaaabb;
      --btn-bg: #4f46e5;
      --btn-hover: #4338ca;
      --btn-text: #ffffff;
      --ctrl-bg: rgba(0,0,0,0.07);
      --ctrl-hover: rgba(0,0,0,0.13);
      --transition: 0.3s ease;
    }

    [data-theme="dark"] {
      --bg-from: #1a1a2e;
      --bg-to: #0d0d14;
      --card-bg: #22223a;
      --card-shadow: 0 8px 32px rgba(0,0,0,0.40);
      --text-primary: #f0f0ff;
      --text-secondary: #aaaacc;
      --text-footer: #555577;
      --btn-bg: #6366f1;
      --btn-hover: #818cf8;
      --btn-text: #ffffff;
      --ctrl-bg: rgba(255,255,255,0.10);
      --ctrl-hover: rgba(255,255,255,0.18);
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: linear-gradient(135deg, var(--bg-from) 0%, var(--bg-to) 100%);
      color: var(--text-primary);
      transition: background var(--transition), color var(--transition);
    }

    /* Controls */
    .controls {
      position: fixed;
      top: 16px;
      right: 16px;
      display: flex;
      gap: 8px;
      z-index: 100;
    }

    .ctrl-btn {
      background: var(--ctrl-bg);
      border: none;
      border-radius: 50px;
      padding: 6px 12px;
      font-size: 1rem;
      cursor: pointer;
      transition: background var(--transition), transform 0.15s;
      color: var(--text-primary);
      user-select: none;
      line-height: 1.4;
    }

    .ctrl-btn:hover {
      background: var(--ctrl-hover);
      transform: scale(1.07);
    }

    /* Layout */
    header {
      padding: 60px 20px 20px;
      text-align: center;
    }

    header h1 {
      font-size: clamp(1.6rem, 5vw, 2.8rem);
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text-primary);
      transition: color var(--transition);
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: var(--card-bg);
      border-radius: 24px;
      box-shadow: var(--card-shadow);
      padding: 48px 56px;
      text-align: center;
      max-width: 400px;
      width: 100%;
      transition: background var(--transition), box-shadow var(--transition);
    }

    .counter-label {
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 12px;
      transition: color var(--transition);
    }

    .counter-number {
      font-size: clamp(4rem, 15vw, 7rem);
      font-weight: 800;
      color: var(--text-primary);
      line-height: 1;
      margin-bottom: 32px;
      display: block;
      transition: color var(--transition);
    }

    .counter-number.bump {
      animation: bump 0.3s ease;
    }

    @keyframes bump {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.18); }
      70%  { transform: scale(0.95); }
      100% { transform: scale(1); }
    }

    .click-btn {
      background: var(--btn-bg);
      color: var(--btn-text);
      border: none;
      border-radius: 14px;
      padding: 16px 40px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background var(--transition), transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 14px rgba(79, 70, 229, 0.35);
      letter-spacing: 0.3px;
    }

    .click-btn:hover {
      background: var(--btn-hover);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(79, 70, 229, 0.45);
    }

    .click-btn:active {
      transform: translateY(0);
    }

    footer {
      text-align: center;
      padding: 24px 20px;
      font-size: 0.8rem;
      color: var(--text-footer);
      transition: color var(--transition);
    }

    @media (max-width: 480px) {
      .card { padding: 36px 28px; }
      header { padding-top: 70px; }
    }
  </style>
</head>
<body>

  <div class="controls">
    <button class="ctrl-btn" id="themeToggle" title="Toggle theme" aria-label="Toggle dark/light mode"></button>
    <button class="ctrl-btn" id="langToggle" title="Toggle language" aria-label="Toggle language"></button>
  </div>

  <header>
    <h1 id="title"></h1>
  </header>

  <main>
    <div class="card">
      <div class="counter-label" id="counterLabel"></div>
      <span class="counter-number" id="counterNumber">0</span>
      <button class="click-btn" id="clickBtn" onclick="increment()"></button>
    </div>
  </main>

  <footer>
    <span id="footerText"></span>
  </footer>

  <script>
    const texts = {
      fr: {
        title: "Bonjour Famille Bertoli",
        label: "clics",
        btn: "Cliquer !",
        footer: "Fait avec ❤️ par les Bertolis",
        themeDark: "🌙",
        themeLight: "☀️",
        lang: "🇬🇧"
      },
      en: {
        title: "Hello Bertoli Family",
        label: "clicks",
        btn: "Click!",
        footer: "Made with ❤️ by the Bertolis",
        themeDark: "🌙",
        themeLight: "☀️",
        lang: "🇫🇷"
      }
    };

    // State
    let lang = localStorage.getItem("bertoli-lang") || "fr";
    let theme = localStorage.getItem("bertoli-theme") ||
      (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
    let count = parseInt(localStorage.getItem("bertoli-count") || "0", 10);

    function applyTheme() {
      document.documentElement.setAttribute("data-theme", theme);
      const t = texts[lang];
      document.getElementById("themeToggle").textContent =
        theme === "dark" ? t.themeLight : t.themeDark;
    }

    function applyLang() {
      const t = texts[lang];
      document.getElementById("title").textContent = t.title;
      document.getElementById("counterLabel").textContent = t.label;
      document.getElementById("clickBtn").textContent = t.btn;
      document.getElementById("footerText").textContent = t.footer;
      document.getElementById("langToggle").textContent = t.lang;
      document.getElementById("themeToggle").textContent =
        theme === "dark" ? t.themeLight : t.themeDark;
      document.documentElement.lang = lang;
    }

    function applyCount() {
      document.getElementById("counterNumber").textContent = count;
    }

    function increment() {
      count++;
      localStorage.setItem("bertoli-count", count);
      const el = document.getElementById("counterNumber");
      el.textContent = count;
      el.classList.remove("bump");
      void el.offsetWidth; // reflow to restart animation
      el.classList.add("bump");
    }

    document.getElementById("themeToggle").addEventListener("click", () => {
      theme = theme === "dark" ? "light" : "dark";
      localStorage.setItem("bertoli-theme", theme);
      applyTheme();
    });

    document.getElementById("langToggle").addEventListener("click", () => {
      lang = lang === "fr" ? "en" : "fr";
      localStorage.setItem("bertoli-lang", lang);
      applyLang();
    });

    // Init
    applyTheme();
    applyLang();
    applyCount();
  </script>
</body>
</html>
