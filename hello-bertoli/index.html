<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello Bertoli Family</title>
  <style>
    :root { --bg: #ffffff; --text: #1a1a2e; --card: #f0f0f5; --accent: #6c63ff; --accent-hover: #5a52d5; }
    [data-theme="dark"] { --bg: #1a1a2e; --text: #e0e0e0; --card: #16213e; --accent: #6c63ff; --accent-hover: #8b83ff; }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      transition: background 0.3s, color 0.3s;
    }

    .theme-toggle {
      position: fixed; top: 1.5rem; right: 1.5rem;
      background: var(--card); border: none; border-radius: 50%;
      width: 48px; height: 48px; font-size: 1.4rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.3s; box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .theme-toggle:hover { transform: scale(1.1); }

    h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
    .subtitle { opacity: 0.7; margin-bottom: 2rem; }

    .counter-card {
      background: var(--card); border-radius: 1rem; padding: 2rem 3rem;
      text-align: center; box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      transition: background 0.3s;
    }
    .count { font-size: 4rem; font-weight: 700; color: var(--accent); }
    .click-btn {
      margin-top: 1rem; padding: 0.8rem 2.5rem; font-size: 1.1rem;
      background: var(--accent); color: #fff; border: none;
      border-radius: 0.5rem; cursor: pointer; transition: background 0.2s;
    }
    .click-btn:hover { background: var(--accent-hover); }
  </style>
</head>
<body>
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark/light mode">🌙</button>

  <h1>Hello Bertoli Family 👋</h1>
  <p class="subtitle">Bienvenue sur notre page de test</p>

  <div class="counter-card">
    <div class="count" id="count">0</div>
    <p>clics</p>
    <button class="click-btn" id="clickBtn">Cliquer !</button>
  </div>

  <script>
    let count = 0;
    const countEl = document.getElementById('count');
    const clickBtn = document.getElementById('clickBtn');
    const themeToggle = document.getElementById('themeToggle');
    const html = document.documentElement;

    clickBtn.addEventListener('click', () => {
      count++;
      countEl.textContent = count;
    });

    themeToggle.addEventListener('click', () => {
      const isDark = html.getAttribute('data-theme') === 'dark';
      html.setAttribute('data-theme', isDark ? 'light' : 'dark');
      themeToggle.textContent = isDark ? '🌙' : '☀️';
    });
  </script>
</body>
</html>
